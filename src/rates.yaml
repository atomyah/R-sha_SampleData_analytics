# =============================================================================
# rates.yaml  —  サンプルデータ検証.py が読み込む「料率・税額表・設定」の表
#
#   料率や税額表が変わったら、このファイルだけ直せばよい（コード本体は不変）。
#   ・健康保険料率は全47都道府県分を保持。契約データの「都道府県」列で自動選択。
#   ・社会保険料率は毎年度変わる   → insurance を更新
#   ・源泉所得税の月額表は税制改正で変わる → withholding に年度を追加
# =============================================================================

# --- 計算の共通設定 ---------------------------------------------------------
settings:
  round_unit_min: 15        # 実働時間の切捨て単位（分）
  pay_tolerance_yen: 50     # 支払額の許容差（円・源泉の階級丸め吸収用）
  legal_daily_hours: 8.0    # 法定労働時間（1日）

# --- 社会保険・消費税の料率 -------------------------------------------------
insurance:
  default_prefecture: 神奈川県   # 契約に都道府県が無いときのフォールバック
  active_year: reiwa7       # 適用する年度サブブロック名。改定時はここを新しい年度キーに変更
  reiwa7:                   # 令和7年度（2025/3〜2026/2 適用 = 2026年1月勤怠に適用）
    consumption: 0.10       # 消費税（標準税率）
    pension:     0.183      # 厚生年金保険料率（労使合計）
    employment:  0.0055     # 雇用保険料率（労働者負担・一般の事業）
    care:        0.0159     # 介護保険料率（全国一律）
    # 健康保険料率（協会けんぽ・都道府県別・労使合計／令和7年3月分〜）
