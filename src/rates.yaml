# --- 源泉所得税 月額表 甲欄（電算機計算の特例）------------------------------
withholding:
  "2026":                   # 令和8年分（2026年1月〜支払分に適用）
    salary_deduction:       # 第1表 給与所得控除 [Aの上限, flat/rate, 率, 加算]
      - [158333, flat, 0,    54167]
      - [299999, rate, 0.30,  6667]
      - [549999, rate, 0.20, 36667]
      - [708330, rate, 0.10, 91667]
      - [null,   flat, 0,   162500]
    dependent_deduction: 31667    # 配偶者・扶養控除（源泉控除対象1人あたり）
    basic_deduction:        # 第3表 基礎控除 [Aの上限, 額]
      - [2120833, 48334]
      - [2162499, 40000]
      - [2204166, 26667]
      - [2245833, 13334]
      - [null,        0]
